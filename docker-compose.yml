version: "3.9"

services:
  db:
    image: postgres:16
    container_name: kigm_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kigm_tracker
      POSTGRES_USER: kigm
      POSTGRES_PASSWORD: kigm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
